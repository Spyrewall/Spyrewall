<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="centerGlow" cx="60%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="10%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#880000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#cc0000" stroke-width="0.4" opacity="0.3"/>
    </pattern>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#cc0000" stroke-width="0.15" opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="#050505"/>
  <rect width="1920" height="1080" fill="url(#smallGrid)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#centerGlow)"/>
  <rect width="1920" height="1080" fill="url(#leftGlow)"/>

  <!-- Circuit lines horizontal -->
  <g stroke="#cc0000" stroke-width="1" opacity="0.25" filter="url(#glow)">
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="650" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
    <line x1="450" y1="360" x2="750" y2="360"/>
    <line x1="0" y1="540" x2="300" y2="540"/>
    <line x1="350" y1="540" x2="700" y2="540"/>
    <line x1="0" y1="720" x2="500" y2="720"/>
    <line x1="550" y1="720" x2="850" y2="720"/>
    <line x1="0" y1="900" x2="350" y2="900"/>
    <line x1="1200" y1="200" x2="1920" y2="200"/>
    <line x1="1100" y1="400" x2="1920" y2="400"/>
    <line x1="1300" y1="600" x2="1920" y2="600"/>
    <line x1="1150" y1="800" x2="1920" y2="800"/>
  </g>

  <!-- Circuit lines vertical -->
  <g stroke="#cc0000" stroke-width="1" opacity="0.2" filter="url(#glow)">
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="120" y1="450" x2="120" y2="700"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="360" y1="150" x2="360" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="250"/>
    <line x1="600" y1="80" x2="600" y2="450"/>
    <line x1="1680" y1="0" x2="1680" y2="500"/>
    <line x1="1560" y1="200" x2="1560" y2="700"/>
    <line x1="1800" y1="300" x2="1800" y2="900"/>
  </g>

  <!-- Circuit nodes / dots -->
  <g fill="#cc0000" filter="url(#glow)">
    <circle cx="120" cy="180" r="4" opacity="0.7"/>
    <circle cx="240" cy="360" r="3" opacity="0.6"/>
    <circle cx="360" cy="180" r="5" opacity="0.8"/>
    <circle cx="480" cy="360" r="3" opacity="0.5"/>
    <circle cx="600" cy="180" r="4" opacity="0.7"/>
    <circle cx="120" cy="540" r="3" opacity="0.5"/>
    <circle cx="360" cy="540" r="4" opacity="0.6"/>
    <circle cx="600" cy="360" r="3" opacity="0.4"/>
    <circle cx="1680" cy="200" r="4" opacity="0.6"/>
    <circle cx="1560" cy="400" r="5" opacity="0.7"/>
    <circle cx="1800" cy="600" r="3" opacity="0.5"/>
    <circle cx="1680" cy="600" r="4" opacity="0.6"/>
  </g>

  <!-- Corner bracket decorations -->
  <g stroke="#cc0000" stroke-width="1.5" fill="none" opacity="0.5" filter="url(#glow)">
    <path d="M 20 20 L 20 80 M 20 20 L 80 20"/>
    <path d="M 1900 20 L 1900 80 M 1900 20 L 1840 20"/>
    <path d="M 20 1060 L 20 1000 M 20 1060 L 80 1060"/>
    <path d="M 1900 1060 L 1900 1000 M 1900 1060 L 1840 1060"/>
  </g>

  <!-- Diagonal accent lines -->
  <g stroke="#cc0000" stroke-width="0.8" opacity="0.15">
    <line x1="0" y1="0" x2="400" y2="400"/>
    <line x1="0" y1="200" x2="200" y2="400"/>
    <line x1="1520" y1="0" x2="1920" y2="400"/>
    <line x1="1720" y1="0" x2="1920" y2="200"/>
  </g>

  <!-- Central red glow ring (faint, behind logo area) -->
  <circle cx="1150" cy="540" r="300" fill="none" stroke="#cc0000" stroke-width="1" opacity="0.12" filter="url(#softGlow)"/>
  <circle cx="1150" cy="540" r="250" fill="none" stroke="#cc0000" stroke-width="0.5" opacity="0.1"/>

  <!-- Scanline overlay -->
  <rect width="1920" height="1080" fill="url(#smallGrid)" opacity="0.1"/>

  <!-- Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
